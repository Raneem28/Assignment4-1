services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: todo-mongodb
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - todo-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Node.js API
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: todo-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5000
      - MONGODB_ATLAS_CONNECTION=mongodb://mongodb:27017/todoapp
      - NODE_ENV=production
    networks:
      - todo-network
    expose:
      - "5000"

  # Frontend React (served by Nginx)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
